services:
    caddy:
        image: caddy:latest
        ports:
            - "80:80"
            - "443:443"
        volumes:
            - ./Caddyfile:/etc/caddy/Caddyfile
            - caddy_data:/data
            - caddy_config:/config
        depends_on:
            - frontend
            - api
        networks:
            - app-network

    frontend:
        build:
            context: ./frontend
            dockerfile: Dockerfile
        networks:
            - app-network
        deploy:
            resources:
                limits:
                    memory: 512M

    api:
        build:
            context: ./api
            dockerfile: Dockerfile
        environment:
            JAVA_OPTS: "-Xmx384M -Xms128M"
            SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/appdb
            SPRING_DATASOURCE_USERNAME: user
            SPRING_DATASOURCE_PASSWORD: pass
            SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - app-network

    postgres:
        image: postgres:15-alpine
        environment:
            POSTGRES_DB: appdb
            POSTGRES_USER: user
            POSTGRES_PASSWORD: pass
        volumes:
            - pgdata:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U user -d appdb"]
            interval: 5s
            timeout: 5s
            retries: 5
        networks:
            - app-network
        deploy:
            resources:
                limits:
                    memory: 128M

volumes:
    pgdata:
    caddy_data:
    caddy_config:

networks:
    app-network:
        driver: bridge
