openapi: 3.1.0
info:
  description: チーム開発中のAPIの仕様書です。
  title: チーム開発SNS (仮) API仕様
  version: 0.1.0
servers:
- url: /
tags:
- description: ログインの処理を行う
  name: auth
- description: ユーザの取得、登録、編集などの処理を行う
  name: users
paths:
  /auth/login:
    post:
      description: |-
        ユーザー名とパスワードを使ってアプリにログインする。
        セッション固定化攻撃対策のため、**セッションIDは新しく生成し直す**こと  (`sessionFixation().migrateSession()`)。
      operationId: loginWithPassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/loginWithPassword_request"
        description: パスワードを使ってシステムにログインする
        required: true
      responses:
        "200":
          description: ログインに成功したら、ユーザ名に関連付けられたセッションを払い出す
        "401":
          content:
            application/problem+json:
              example:
                type: https://problems-registry.smartbear.com/unauthorized
                title: 認証失敗
                detail: ユーザー名またはパスワードが異なります
              schema:
                $ref: "#/components/schemas/loginWithPassword_401_response"
          description: ユーザー名またはパスワードが異なる。あるいはアカウントがロックアウトされているなどでログインに失敗した。
      security: []
      summary: ログイン (パスワード)
      tags:
      - auth
      x-content-type: application/json
      x-accepts:
      - application/problem+json
      x-tags:
      - tag: auth
  /auth/logout:
    post:
      description: Cookie で指定されたセッションを無効化してログアウトする
      operationId: logout
      responses:
        "204":
          description: ログアウトに成功した
      security:
      - SessionAuth: []
      summary: ログアウト
      tags:
      - auth
      x-accepts:
      - application/json
      x-tags:
      - tag: auth
  /users:
    post:
      description: ユーザー登録を行う。この際、詳細なプロフィール情報は入力項目に含めない。なお、この段階ではメールアドレス未認証のため、有効化されていないことに注意
      operationId: registerUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/registerUser_request"
        description: パスワードやユーザ名などのユーザー登録に必要な情報を指定する。
      responses:
        "204":
          description: ユーザー登録に成功したら、新しいユーザー名を返す
        "409":
          content:
            application/json:
              example:
                type: https://problems-registry.smartbear.com/already-exists
                title: 登録失敗
                detail: メールアドレスが既に登録されています
              schema:
                $ref: "#/components/schemas/loginWithPassword_401_response"
          description: メールアドレスやユーザー名が重複している
        "422":
          content:
            application/json:
              example:
                type: https://problems-registry.smartbear.com/validation-error
                title: 登録失敗
                detail: 確認用のパスワードが一致しません
              schema:
                $ref: "#/components/schemas/loginWithPassword_401_response"
          description: 仕様上不正な形式でログインが行われた
      security: []
      summary: ユーザ登録
      tags:
      - users
      x-content-type: application/json
      x-accepts:
      - application/json
      x-tags:
      - tag: users
  /users/availability:
    post:
      description: ユーザー名やメールアドレスに重複がないか確認する
      operationId: checkUserAvailability
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/checkUserAvailability_request"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/checkUserAvailability_200_response"
          description: ユーザーIDの重複チェックの結果
        "401":
          content:
            application/json:
              example:
                title: 遷移エラー
                detail: 更新用のバリデーションは、認証済みの場合に限って使用できます
                type: https://problem-registry.smartbear.com/unauthorized
              schema:
                $ref: "#/components/schemas/loginWithPassword_401_response"
          description: 未認証の状態で context=update を呼び出した。（※特にこの挙動にリスクはなさそうだが、仕様外の呼び出しにはエラーで対応するべきか）
        "422":
          content:
            application/json:
              example:
                type: https://problem-registry.smartbear.com/validation-error
                title: 不正な値
                detail: 指定したユーザー名のフォーマットが不正です
              schema:
                $ref: "#/components/schemas/loginWithPassword_401_response"
          description: ユーザーIDのチェック以前に、バリデーションに引っかかった
      security: []
      summary: ユーザー識別子の有効性チェック
      tags:
      - users
      x-content-type: application/json
      x-accepts:
      - application/json
      x-tags:
      - tag: users
  /users/verify-email:
    get:
      description: 登録したメールアドレスに送られたマジックリンクを踏むと、メールアドレスの認証に成功する
      operationId: verifyEmail
      parameters:
      - description: メールアドレス認証に用いる十分にランダムなトークン
        explode: true
        in: query
        name: token
        required: true
        schema:
          pattern: "^[a-zA-Z0-9]{64}$"
          type: string
        style: form
      responses:
        "302":
          description: メールアドレス認証完了画面 / エラー画面にリダイレクトする
          headers:
            Location:
              description: リダイレクト先は画面のルーティングに合わせる
              explode: false
              schema:
                format: url
                type: string
              style: simple
      security: []
      summary: メールアドレス認証
      tags:
      - users
      x-accepts:
      - application/json
      x-tags:
      - tag: users
  /users/me:
    delete:
      description: ユーザーを削除する。再認証が必要。
      operationId: deleteUser
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/deleteUser_request"
        description: 再認証用のパスワードを指定する
      responses:
        "204":
          description: ユーザーの削除に成功した
        "401":
          content:
            application/json:
              example:
                type: https://problem-registry.smartbear.com/unauthorized
                title: 削除失敗
                detail: 現在のパスワードが異なります
              schema:
                $ref: "#/components/schemas/loginWithPassword_401_response"
          description: 現在のパスワードが間違っている、またはロックアウトによって、再設定に失敗した
      security:
      - SessionAuth: []
      summary: 退会
      tags:
      - users
      x-content-type: application/json
      x-accepts:
      - application/json
      x-tags:
      - tag: users
    get:
      description: 自分のユーザー情報を取得する
      operationId: findSelf
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/findSelf_200_response"
          description: 自身のユーザー情報
        "401":
          content:
            application/json:
              example:
                title: 権限エラー
                detail: 自身のユーザーIDを取得するためには、ログインが必要です。
              schema:
                $ref: "#/components/schemas/findSelf_200_response"
          description: 未認証の状態でアクセスした
      security:
      - SessionAuth: []
      summary: 自分の情報取得
      tags:
      - users
      x-accepts:
      - application/json
      x-tags:
      - tag: users
  /users/me/password:
    put:
      description: 認証済みのユーザーがパスワードを再設定する。再認証が必要。
      operationId: changePassword
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/changePassword_request"
        description: 現在のパスワードと、新しく設定するパスワード
      responses:
        "204":
          description: パスワードの変更に成功した
        "401":
          content:
            application/json:
              example:
                type: https://problem-registry.smartbear.com/unauthorized
                title: パスワード再設定失敗
                detail: 現在のパスワードが異なります
              schema:
                $ref: "#/components/schemas/loginWithPassword_401_response"
          description: 現在のパスワードが間違っている、またはロックアウトによって、再設定に失敗した
        "422":
          content:
            application/json:
              example:
                type: https://problem-registry.smartbear.com/validation-error
                title: パスワード再設定失敗
                detail: パスワードは半角文字もしくは半角記号で入力してください
              schema:
                $ref: "#/components/schemas/loginWithPassword_401_response"
          description: パスワードの形式が異なる
      security:
      - SessionAuth: []
      summary: パスワード変更
      tags:
      - users
      x-content-type: application/json
      x-accepts:
      - application/json
      x-tags:
      - tag: users
  /users/me/email:
    post:
      description: 認証済みのユーザーがメールアドレスを変更する。再認証及びメールアドレスの到達確認が必要。
      operationId: changeEmail
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/changeEmail_request"
        description: 新しく設定するメールアドレス
      responses:
        "204":
          description: 確認メールの送信に成功した (メールアドレスの変更自体は未完了)
        "401":
          content:
            application/json:
              example:
                type: https://problem-registry.smartbear.com/unauthorized
                title: メールアドレス変更失敗
                detail: 再認証に失敗しました
              schema:
                $ref: "#/components/schemas/loginWithPassword_401_response"
          description: 再認証に失敗した
        "409":
          content:
            application/json:
              example:
                type: https://problem-registry.smartbear.com/already-exists
                title: メールアドレス変更失敗
                detail: 指定されたメールアドレスは既に登録されています
              schema:
                $ref: "#/components/schemas/loginWithPassword_401_response"
          description: 新しいメールアドレスが既に登録されている
      security:
      - SessionAuth: []
      summary: メールアドレス変更
      tags:
      - users
      x-content-type: application/json
      x-accepts:
      - application/json
      x-tags:
      - tag: users
components:
  schemas:
    registerUser_request:
      properties:
        email:
          description: 新しく設定するメールアドレス
          example: taroden@example.com
          format: email
          type: string
        username:
          description: ユーザー名（Twitterの@XXXのXXXに相当する部分）
          example: taroden
          maxLength: 30
          minLength: 4
          pattern: "^[a-zA-Z0-9]+$"
          type: string
        password:
          description: 新しく設定するパスワード（確認用）
          example: p@ss0rd123!v
          maxLength: 100
          minLength: 8
          pattern: "^[!-~]+$"
          type: string
        password_verify:
          description: 確認用のパスワード。基本はクライアントサイドでチェックするが、サーバーサイドでもチェックする。
          example: p@ss0rd123!v
          maxLength: 100
          minLength: 8
          pattern: "^[!-~]+$"
          type: string
      required:
      - email
      - password
      - password_verify
      - username
    findSelf_200_response:
      example:
        email: taroden@example.com
        username: taroden
      properties:
        username:
          description: ユーザー名（Twitterの@XXXのXXXに相当する部分）
          example: taroden
          maxLength: 30
          minLength: 4
          pattern: "^[a-zA-Z0-9]+$"
          type: string
        email:
          description: ログインや通知に用いるユーザーのメールアドレス
          example: taroden@example.com
          format: email
          type: string
    deleteUser_request:
      properties:
        password:
          description: ユーザーがログインに使用するパスワード
          example: p@ss0rd123!
          type: string
    changePassword_request:
      properties:
        current_password:
          description: 現在のパスワード
          example: old
          type: string
        new_password:
          description: 新しく設定するパスワード（確認用）
          example: p@ss0rd123!v
          maxLength: 100
          minLength: 8
          pattern: "^[!-~]+$"
          type: string
        new_password_verify:
          description: 新しく設定するパスワード（確認用）
          example: p@ss0rd123!v
          maxLength: 100
          minLength: 8
          pattern: "^[!-~]+$"
          type: string
    loginWithPassword_401_response:
      example:
        instance: instance
        code: code
        detail: detail
        type: https://openapi-generator.tech
        title: title
        errors:
        - pointer: pointer
          code: code
          parameter: parameter
          header: header
          detail: detail
        - pointer: pointer
          code: code
          parameter: parameter
          header: header
          detail: detail
        - pointer: pointer
          code: code
          parameter: parameter
          header: header
          detail: detail
        - pointer: pointer
          code: code
          parameter: parameter
          header: header
          detail: detail
        - pointer: pointer
          code: code
          parameter: parameter
          header: header
          detail: detail
        status: 139
      properties:
        type:
          description: 問題の種別を識別する URI 参照。
          format: uri
          maxLength: 1024
          type: string
        status:
          description: この問題の発生時にオリジンサーバーが生成した HTTP ステータスコード。
          format: int32
          maximum: 599
          minimum: 100
          type: integer
        title:
          description: |
            問題の種別を簡潔に表した人間可読な要約。 ローカライズを除き、同一の問題種別では内容が変わるべきではありません。
          maxLength: 1024
          type: string
        detail:
          description: この問題の発生状況に固有の、人間可読な詳細説明。
          maxLength: 4096
          type: string
        instance:
          description: |
            問題の具体的な発生事例を識別する URI 参照。 参照先が追加情報を返す場合も、返さない場合もあります。
          maxLength: 1024
          type: string
        code:
          description: プロバイダー独自のエラー分類やレジストリに基づく API 固有のエラーコード。
          maxLength: 50
          type: string
        errors:
          description: Problem Details レスポンスに付随する詳細エラー情報の配列。
          items:
            $ref: "#/components/schemas/loginWithPassword_401_response_errors_inner"
          maxItems: 1000
          type: array
      required:
      - detail
    checkUserAvailability_request:
      properties:
        email:
          description: ログインや通知に用いるユーザーのメールアドレス
          example: taroden@example.com
          format: email
          type: string
        username:
          description: ユーザー名（Twitterの@XXXのXXXに相当する部分）
          example: taroden
          maxLength: 30
          minLength: 4
          pattern: "^[a-zA-Z0-9]+$"
          type: string
        context:
          description: 有効性チェックを行うコンテキスト。updateの場合は自身のユーザーIDを検索対象から除外する
          enum:
          - register
          - update
          type: string
      required:
      - context
    checkUserAvailability_200_response_username:
      example:
        available: true
      properties:
        available:
          description: ユーザー名に重複がなければ `true`
          type: boolean
    checkUserAvailability_200_response:
      example:
        email:
          available: true
        username:
          available: true
      properties:
        username:
          $ref: "#/components/schemas/checkUserAvailability_200_response_username"
        email:
          $ref: "#/components/schemas/checkUserAvailability_200_response_email"
    checkUserAvailability_200_response_email:
      example:
        available: true
      properties:
        available:
          description: メールアドレスに重複がなければ `true`
          type: boolean
    loginWithPassword_request:
      properties:
        username:
          description: ログイン時に用いるユーザーの識別子。現状は仕様通りメールアドレスを用いるが、将来拡張される可能性がある。
          example: user01@example.com
          type: string
        password:
          description: 再認証用のパスワード
          example: old
          type: string
      required:
      - password
      - username
    loginWithPassword_401_response_errors_inner:
      description: API 利用者に対して、問題の詳細を明示的に提供するためのオブジェクト。
      example:
        pointer: pointer
        code: code
        parameter: parameter
        header: header
        detail: detail
      properties:
        detail:
          description: |
            リクエストボディのプロパティ、クエリパラメータ、 パスパラメータ、またはヘッダーに関連する具体的なエラー内容の説明。
          maxLength: 4096
          type: string
        pointer:
          description: エラーの原因となったリクエストボディ内のプロパティを指す JSON Pointer。
          maxLength: 1024
          type: string
        parameter:
          description: エラーの原因となったクエリパラメータまたはパスパラメータの名前。
          maxLength: 1024
          type: string
        header:
          description: エラーの原因となった HTTP ヘッダーの名前。
          maxLength: 1024
          type: string
        code:
          description: エラーの文脈を識別するための、プロバイダー固有の追加コード。
          maxLength: 50
          type: string
      required:
      - detail
    changeEmail_request:
      properties:
        password:
          description: 再認証用のパスワード
          example: old
          type: string
        new_email:
          description: 新しく設定するメールアドレス
          example: taroden@example.com
          format: email
          type: string
      required:
      - new_email
      - password
  securitySchemes:
    SessionAuth:
      in: cookie
      name: JSESSIONID
      type: apiKey
