on: 
  pull_request:
    paths:
      - "openapi/*"
      - ".github/*"
  workflow_dispatch:

jobs:
  redocly-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Run Redocly lint
        run: pnpm --package=@redocly/cli dlx redocly lint openapi/openapi.yaml --format github-actions
