type: object
required:
  - detail
properties:
  type:
    type: string
    format: uri
    description: 問題の種別を識別する URI 参照。
    maxLength: 1024

  status:
    type: integer
    format: int32
    description: この問題の発生時にオリジンサーバーが生成した HTTP ステータスコード。
    minimum: 100
    maximum: 599

  title:
    type: string
    description: >
      問題の種別を簡潔に表した人間可読な要約。
      ローカライズを除き、同一の問題種別では内容が変わるべきではありません。
    maxLength: 1024

  detail:
    type: string
    description: この問題の発生状況に固有の、人間可読な詳細説明。
    maxLength: 4096

  instance:
    type: string
    description: >
      問題の具体的な発生事例を識別する URI 参照。
      参照先が追加情報を返す場合も、返さない場合もあります。
    maxLength: 1024

  code:
    type: string
    description: プロバイダー独自のエラー分類やレジストリに基づく API 固有のエラーコード。
    maxLength: 50

  errors:
    type: array
    description: Problem Details レスポンスに付随する詳細エラー情報の配列。
    maxItems: 1000
    items:
      type: object
      description: API 利用者に対して、問題の詳細を明示的に提供するためのオブジェクト。
      required:
        - detail
      properties:
        detail:
          type: string
          description: >
            リクエストボディのプロパティ、クエリパラメータ、
            パスパラメータ、またはヘッダーに関連する具体的なエラー内容の説明。
          maxLength: 4096

        pointer:
          type: string
          description: エラーの原因となったリクエストボディ内のプロパティを指す JSON Pointer。
          maxLength: 1024

        parameter:
          type: string
          description: エラーの原因となったクエリパラメータまたはパスパラメータの名前。
          maxLength: 1024

        header:
          type: string
          description: エラーの原因となった HTTP ヘッダーの名前。
          maxLength: 1024

        code:
          type: string
          description: エラーの文脈を識別するための、プロバイダー固有の追加コード。
          maxLength: 50